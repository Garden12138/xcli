name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - run: go mod download
      - name: Check module files
        run: go mod tidy -diff
      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code
      - run: go vet ./...
      - run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - run: go mod download
      - name: Cross-build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -trimpath -o /tmp/xcli-${{ matrix.goos }}-${{ matrix.goarch }} .

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
      - run: go mod download
      - uses: goreleaser/goreleaser-action@v7.2.3
        with:
          distribution: goreleaser
          version: v2.16.0
          args: release --snapshot --clean
