version: 1
default_agent: codex

agents:
  claude:
    adapter: claude
    command: claude
    network: proxy

  codex:
    adapter: codex
    command: codex
    network: proxy
    args:
      - --sandbox
      - workspace-write

  gemini:
    adapter: gemini
    command: gemini
    network: proxy

  opencode:
    adapter: opencode
    command: opencode
    network: direct

  deepseek:
    adapter: opencode
    command: opencode
    network: direct
    args:
      - --model
      - deepseek/deepseek-chat
    # An explicit ACP block completely replaces the ordinary command arguments.
    acp:
      command: opencode
      args:
        - acp

routing:
  rules:
    - name: review
      prompt_regex: '(?i)(review|audit|审查)'
      agent: claude

mcp:
  servers:
    context7:
      transport: http
      url: https://mcp.context7.com/mcp

    local-tools:
      transport: stdio
      command: npx
      args:
        - -y
        - "@example/mcp-server"
      cwd: .
      env:
        LOG_LEVEL: info
      env_vars:
        - SERVICE_TOKEN
      targets:
        - codex
        - claude

networks:
  proxy:
    set:
      HTTP_PROXY: http://127.0.0.1:6738
      HTTPS_PROXY: http://127.0.0.1:6738
    unset: []

  direct:
    set: {}
    unset:
      - HTTP_PROXY
      - HTTPS_PROXY
      - ALL_PROXY
      - http_proxy
      - https_proxy
      - all_proxy

recording:
  output: false
